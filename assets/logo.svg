<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" preserveAspectRatio="xMidYMid meet" role="img" aria-label="3x Intelligent Markets">
  <defs>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f8a6b"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <style>
      .wordmark { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif; font-weight: 800; letter-spacing: -0.04em; }
      .subline  { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif; font-weight: 600; letter-spacing: 0.42em; }
    </style>
  </defs>

  <!-- Background card so the logo holds up on dark + light themes -->
  <rect x="0" y="0" width="720" height="220" rx="20" fill="#0b1220"/>

  <!-- Subtle grid -->
  <g stroke="#1f2a3a" stroke-width="1">
    <line x1="40"  y1="170" x2="680" y2="170"/>
    <line x1="40"  y1="50"  x2="40"  y2="170"/>
  </g>

  <!-- Spark chart accent — quick line + final candle to allude to markets -->
  <polyline
    fill="none"
    stroke="url(#markGrad)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    points="60,140 110,120 150,128 200,98 250,108 300,78 350,88 400,62 450,72 500,50"
  />
  <circle cx="500" cy="50" r="5.5" fill="#10b981"/>

  <!-- Wordmark: "3x" -->
  <text class="wordmark" x="360" y="138" text-anchor="middle" font-size="120" fill="#ffffff">3x</text>

  <!-- Subline: tracked small caps -->
  <text class="subline" x="360" y="190" text-anchor="middle" font-size="14" fill="#9fb1c6">INTELLIGENT  MARKETS</text>
</svg>
