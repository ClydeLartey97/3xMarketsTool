services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: threex
      POSTGRES_USER: threex
      POSTGRES_PASSWORD: threex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
    environment:
      DATABASE_URL: postgresql+psycopg://threex:threex@postgres:5432/threex
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app

  frontend:
    build:
      context: ../frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
